<html>
<body>
    <div>
        <button onclick="changeBgColor('Red')">Change Red</button>
        <button onclick="changeBgColor('Blue')">Change Blue</button>
    </div>
    <script>
        function changeBgColor(value) {
            document.body.style.backgroundColor = value;
        }
    </script>
